# ============================================================
# netlify.toml — Netlify Frontend Deployment Config
# FIX: /api/* redirect moved ABOVE /* to avoid being swallowed
#      by the SPA catch-all. Both use force=true.
# ============================================================

[build]
  base    = "."
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV     = "production"

# ── 1. API proxy — MUST come before the SPA catch-all ────────
# Replace the URL below with your actual Vercel backend URL
[[redirects]]
  from   = "/api/*"
  to     = "https://testitnow-backend.vercel.app/api/:splat"
  status = 200
  force  = true

# ── 2. SPA routing — all other routes go to index.html ───────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets ───────────────────────────────────────
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Local dev ─────────────────────────────────────────────────
[dev]
  command    = "npm start"
  port       = 3000
  targetPort = 3000
  framework  = "#custom"
