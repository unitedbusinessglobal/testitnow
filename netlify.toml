# ============================================================
# netlify.toml — Netlify Frontend Deployment Config
# Frontend: React (Create React App or Vite)
# Backend:  Vercel (separate repo/project)
# ============================================================

[build]
  base    = "."                  # root of the frontend repo
  command = "npm run build"
  publish = "build"              # CRA output; change to "dist" for Vite

# ── Environment variables injected at build time ─────────────
# Do NOT put secrets here — set them in Netlify UI → Site Settings → Env Vars
[build.environment]
  NODE_VERSION   = "20"
  NODE_ENV       = "production"

# ── SPA routing — send all routes to index.html ──────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Proxy API calls to Vercel during local dev (netlify dev) ─
# Prevents CORS issues in development
[[redirects]]
  from   = "/api/*"
  to     = "https://your-project.vercel.app/api/:splat"
  status = 200
  force  = true

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-XSS-Protection             = "1; mode=block"
    X-Content-Type-Options       = "nosniff"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy      = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagservices.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https:;
      connect-src 'self' https://your-project.vercel.app https://pagead2.googlesyndication.com;
      frame-src https://googleads.g.doubleclick.net;
    """

# ── Cache static assets ───────────────────────────────────────
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Netlify Dev proxy config (local development) ─────────────
[dev]
  command   = "npm start"        # CRA dev server
  port      = 3000
  targetPort = 3000
  framework = "#custom"
