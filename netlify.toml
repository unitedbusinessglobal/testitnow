# ============================================================
# netlify.toml — Netlify Frontend Deployment Config
# ============================================================

[build]
  base    = ""
  command = "npm install && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION  = "9"
  NODE_ENV     = "production"
  CI           = "false"

# ── 1. API proxy — MUST come before the SPA catch-all ────────
[[redirects]]
  from   = "/api/*"
  to     = "https://testitnow-prod.vercel.app/api/:splat"
  status = 200
  force  = true

# ── 2. SPA routing ───────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache static assets ───────────────────────────────────────
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  command    = "npm start"
  port       = 3000
  targetPort = 3000
  framework  = "#custom"
