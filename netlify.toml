[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "24"
  CI = "false"

[[redirects]]
  from   = "/api/*"
  to     = "https://testitnow-prod.vercel.app/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
